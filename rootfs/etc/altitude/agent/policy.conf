# Altitude agentic shell policy.
#
# This file is sourced by /bin/alt-agent for simple environment overrides only.
# It intentionally does not grant arbitrary shell execution.

ALTITUDE_WORKSHOP_ROOT="${ALTITUDE_WORKSHOP_ROOT:-/srv/altitude}"
ALTITUDE_AGENT_LOG_ROOT="${ALTITUDE_AGENT_LOG_ROOT:-/var/log/altitude/agent}"

if [ -z "${ALTITUDE_AGENT_SOURCE_ROOT:-}" ]; then
  if [ -d /root/minibash-linux/scripts ] && [ -d /root/minibash-linux/recipes ]; then
    ALTITUDE_AGENT_SOURCE_ROOT=/root/minibash-linux
  else
    ALTITUDE_AGENT_SOURCE_ROOT=/usr/src/altitude
  fi
fi

ALTITUDE_AGENT_SCRIPTS="${ALTITUDE_AGENT_SCRIPTS:-$ALTITUDE_AGENT_SOURCE_ROOT/scripts}"
