# Altitude desktop profile contract.
#
# This file is owned by altitude-desktop-base. It records the expected base
# desktop experience for release images; actual services stay managed by
# systemd and observed through the registry.
PROFILE=desktop
SESSION=gnome
APP_REGISTRY=app_registry
SOFTWARE_CENTER=altitude-software
TERMINAL=altitude-gnome-console
CONTROL_CENTER=altitude-control-center
PACKAGE_MANAGER=altpkg
