# iwlwifi WiFi workarounds for the disk-root target (HP Omen, Intel card).
# power_scheme=1 : CAM (continuously active) -> disables WiFi power-save so the
#                  card does not sleep through the AP's EAPOL key frames.
# 11n_disable=1  : conservative link mode for Intel cards that fail WPA PTK
#                  install on some AP/firmware combinations.
# bt_coex_active=0: avoid Bluetooth coexistence firmware path while debugging.
options iwlwifi 11n_disable=1 bt_coex_active=0 power_save=0
options iwlmvm power_scheme=1
