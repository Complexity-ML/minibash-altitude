[LightDM]
# logind via elogind, not systemd
logind-load-seats=false

[Seat:*]
autologin-user=minibash
autologin-user-timeout=0
# GNOME on Xorg first (most forgiving without systemd); the greeter still lets
# you pick "GNOME" (Wayland) or "Sway" if this fails.
autologin-session=gnome-xorg
user-session=gnome-xorg
greeter-session=lightdm-gtk-greeter
