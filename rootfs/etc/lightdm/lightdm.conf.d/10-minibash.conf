[LightDM]
# logind via elogind, not systemd
logind-load-seats=false
start-default-seat=true
logind-check-graphical=false

[Seat:*]
autologin-user=minibash
autologin-user-timeout=0
# Run our ~/.xsession wrapper. It starts a user D-Bus session explicitly before
# GNOME, which is required on this non-systemd image.
autologin-session=lightdm-xsession
user-session=lightdm-xsession
greeter-session=lightdm-gtk-greeter
